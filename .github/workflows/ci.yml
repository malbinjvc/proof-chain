name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: '3.10'

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('proof-chain.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Build dependencies
        run: cabal build --only-dependencies

      - name: Build project
        run: cabal build

      - name: Run tests
        run: cabal test --test-show-details=direct

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t proof-chain:test .

      - name: Verify Docker image
        run: |
          docker run --rm -d --name proof-chain-test -p 8080:8080 proof-chain:test
          sleep 3
          docker logs proof-chain-test
          docker stop proof-chain-test
